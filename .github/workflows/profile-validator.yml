name: Automation Architect: Profile Health Check

on:
  schedule:
    - cron: '0 12 * * *' # Once a day at noon
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'README.md'

jobs:
  validate-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for broken links (Lychee)
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress README.md

      - name: Verify Stats and Trophies APIs
        run: |
          echo "Verifying GitHub Stats API..."
          curl -fsSL -o /dev/null "https://github-readme-stats.vercel.app/api?username=gbvk312" || echo "::warning::Stats API unavailable"

          echo "Verifying Top Languages API..."
          curl -fsSL -o /dev/null "https://github-readme-stats.vercel.app/api/top-langs/?username=gbvk312" || echo "::warning::Top Languages API unavailable"

          echo "Verifying GitHub Profile Trophies..."
          curl -fsSL -o /dev/null "https://github-profile-trophy.vercel.app/?username=gbvk312" || echo "::warning::Trophies API unavailable"

          echo "All profile components checked!"
