name: "Automation Architect: Profile Health Check"

on:
  schedule:
    - cron: '0 12 * * *' # Once a day at noon
  workflow_dispatch:
  push:
    branches: [ main ]
    # paths:
    #   - 'README.md'

jobs:
  validate-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for broken links (Lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md
          fail: true

      - name: Verify Profile Components (Automation Architect)
        run: |
          # Component health tracking
          FAILED=0
          
          check_url() {
            local label=$1
            local url=$2
            local critical=$3
            
            echo "Verifying $label..."
            if curl -Isf --retry 3 --retry-delay 5 "$url" > /dev/null; then
              echo "✅ $label is healthy"
            else
              if [ "$critical" = "true" ]; then
                echo "❌ $label is DOWN (Critical)"
                FAILED=1
              else
                echo "::warning::$label is transiently unavailable or broken."
                echo "⚠️ $label is UNHEALTHY"
              fi
            fi
          }

          # 1. Core Visuals (Critical)
          check_url "GitHub Stats (Anurag Hazra)" "https://github-readme-stats-anuraghazra1.vercel.app/api?username=gbvk312" "true"
          check_url "Top Languages" "https://github-readme-stats-anuraghazra1.vercel.app/api/top-langs/?username=gbvk312" "true"
          check_url "Capsule Render (Header)" "https://capsule-render.vercel.app/api?type=waving&color=gradient&height=280&section=header&text=Bhanu%20Vamsi%20Krishna" "true"
          
          # 2. Dynamic Features (Non-Critical)
          check_url "Typing SVG" "https://readme-typing-svg.herokuapp.com/?color=00F7FF&size=28&center=true&vCenter=true&width=800&lines=The+Automation+Architect" "false"
          check_url "Skill Icons" "https://skillicons.dev/icons?i=python,bash,linux,docker,git" "false"
          check_url "Activity Graph" "https://github-readme-activity-graph.vercel.app/graph?username=gbvk312" "false"
          
          # 3. Assets & Analytics (Non-Critical)
          check_url "Contribution Snake" "https://raw.githubusercontent.com/gbvk312/gbvk312/output/github-contribution-grid-snake.svg" "false"
          check_url "Visitor Badge" "https://api.visitorbadge.io/api/visitors?path=gbvk312" "false"
          check_url "Profile Views" "https://komarev.com/ghpvc/?username=gbvk312" "false"
          
          # 4. Previously Broken / Optional
          check_url "Profile Trophies" "https://github-profile-trophy.vercel.app/?username=gbvk312" "false"

          if [ $FAILED -ne 0 ]; then
            echo "::error::Critical profile components are missing or broken!"
            exit 1
          fi
          
          echo "Automation Architect ecosystem check complete!"
