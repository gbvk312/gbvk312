name: Profile Manager

on:
  schedule:
    - cron: '0 0 * * *' # Daily sync
  workflow_dispatch:

jobs:
  refresh-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dynamic Stats Pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Syncing profile metrics..."
          python3 scripts/update_profile.py
          date > .last_sync
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md .last_sync
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: profile heartbeat sync [skip ci]" && git push)
